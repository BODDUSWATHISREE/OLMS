<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login">
    <h1 class="reg-header">
      <img src="user.webp" alt="icon" class="reg-icon"> Register
    </h1>

    <form id="registerForm">
      <input type="text" name="id_number" placeholder="Id Number" required>
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <select name="role" required>
        <option value="">Select Role</option>
        <option value="Student">Student</option>
        <option value="Teacher">Teacher</option>
      </select>
      <button type="submit">Submit</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
    <p>Forgot password? <a href="reset.html">Reset</a></p>
  </div>
<script>
const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const formData = new FormData(form);
  const data = Object.fromEntries(formData.entries());

  try {
    const response = await fetch("http://127.0.0.1:8000/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });

    const result = await response.json();

    if (response.ok) {
      // ✅ Store student ID in localStorage
      localStorage.setItem("studentId", result.id_number);

      if (result.role === "Student") {
        window.location.href = "/apply-leave.html"; // redirect to apply leave page
      } else if (result.role === "Teacher") {
        window.location.href = "/teacher-dashboard.html";
      }
    }
  } catch (err) {
    console.error(err);
    alert("Server error");
  }
});
</script>
</body>
</html>
